<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SlowBeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #eef7fb;
      --surface:  #deeef7;
      --surface2: #cde4f2;
      --text:     #0b2535;
      --sub:      rgba(11,37,53,0.58);
      --muted:    rgba(11,37,53,0.36);
      --blue:     #2d7fa8;
      --aqua:     #1fa8a3;
      --border:   rgba(11,37,53,0.1);
      --border2:  rgba(11,37,53,0.18);
      --sans:     'Outfit', system-ui, sans-serif;
      --mono:     'DM Mono', 'Courier New', monospace;
    }

    html, body { height: 100%; width: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
               env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
      position: relative;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle radial glow — coastal light from above */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 35%, rgba(45,127,168,0.08) 0%, transparent 60%);
      transition: background 3s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      position: relative;
      z-index: 1;
      padding-top: max(28px, env(safe-area-inset-top, 28px));
      text-align: center;
    }

    .app-name {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stage-badge {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(45,127,168,0.3);
      border-radius: 6px;
      padding: 5px 14px 5px 10px;
      background: rgba(45,127,168,0.08);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: var(--blue);
      text-transform: uppercase;
      transition: background 2.5s ease, border-color 2.5s ease, color 2.5s ease;
    }

    .stage-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--blue);
      transition: background 2.5s ease;
      animation: dotPulse 2.5s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── CENTER ──────────────────────────────────────────────── */
    .center-stage {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1;
    }

    .breathing-ring {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(45,127,168,0.15);
      opacity: 0;
      transition: border-color 2.5s ease;
      pointer-events: none;
    }

    .running .breathing-ring {
      opacity: 1;
      animation: breathe 10s ease-in-out infinite;
    }

    @keyframes breathe {
      0%   { transform: scale(1);    opacity: 0.25; }
      45%  { transform: scale(1.14); opacity: 0.08; }
      100% { transform: scale(1);    opacity: 0.25; }
    }

    .ripple-container {
      position: absolute;
      width: 240px; height: 240px;
      pointer-events: none;
    }

    .ripple {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(45,127,168,0.35);
      opacity: 0;
      transition: border-color 2.5s ease;
    }

    .ripple.fire      { animation: rippleOut  1.1s ease-out forwards; }
    .ripple-2.fire    { animation: rippleOut2 1.4s ease-out forwards; }

    @keyframes rippleOut  {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0;   }
    }
    @keyframes rippleOut2 {
      0%   { transform: scale(1);   opacity: 0.25; }
      100% { transform: scale(2.1); opacity: 0;    }
    }

    /* Orb */
    .main-circle {
      position: relative;
      width: 240px; height: 240px;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: box-shadow 2.5s ease, background 2.5s ease;
      background: radial-gradient(circle at 42% 38%,
        rgba(255,255,255,0.9) 0%,
        rgba(45,127,168,0.18) 48%,
        rgba(31,168,163,0.08) 72%,
        transparent 88%);
      box-shadow:
        0 0 0 1px rgba(45,127,168,0.18),
        0 8px 40px rgba(45,127,168,0.16),
        0 2px 12px rgba(45,127,168,0.1);
    }

    .idle .main-circle { animation: idleBreath 5s ease-in-out infinite; }

    @keyframes idleBreath {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(45,127,168,0.14),
          0 6px 30px rgba(45,127,168,0.12),
          0 2px 8px rgba(45,127,168,0.07);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(45,127,168,0.26),
          0 12px 52px rgba(45,127,168,0.22),
          0 4px 16px rgba(45,127,168,0.12);
      }
    }

    .main-circle.beat {
      animation: beatPulse 0.3s ease-out forwards;
    }

    @keyframes beatPulse {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.045); }
      100% { transform: scale(1); }
    }

    .paused .main-circle { opacity: 0.55; }

    .bpm-number {
      font-weight: 700;
      font-size: 80px;
      color: var(--blue);
      line-height: 1;
      letter-spacing: -0.04em;
      transition: color 2s ease;
    }

    .bpm-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .time-elapsed {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--sub);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ── BOTTOM ──────────────────────────────────────────────── */
    .bottom-section {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      padding: 0 32px;
      padding-bottom: max(36px, env(safe-area-inset-bottom, 36px));
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }

    .progress-timeline {
      width: 100%;
      display: flex; flex-direction: column; gap: 10px;
    }

    .stage-segments {
      display: flex; gap: 3px;
      width: 100%; height: 5px;
    }

    .segment {
      height: 100%; border-radius: 2px;
      background: rgba(11,37,53,0.1);
      position: relative; overflow: hidden;
      transition: background 0.5s ease;
    }

    .segment-fill {
      position: absolute; inset: 0;
      width: 0%; background: var(--blue);
      border-radius: 2px;
      transition: background 2.5s ease;
    }

    .stage-labels {
      display: flex; justify-content: space-between; width: 100%;
    }

    .stage-label {
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); transition: color 0.4s ease;
    }

    .stage-label.active { color: var(--blue); transition: color 2.5s ease; }

    /* Volume */
    .volume-row {
      display: flex; align-items: center; gap: 12px; width: 100%;
    }

    .volume-icon { flex-shrink: 0; color: var(--muted); width: 16px; height: 16px; }

    .volume-label {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.08em;
      flex-shrink: 0; min-width: 40px;
    }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 2px;
      background: rgba(11,37,53,0.14);
      border-radius: 2px; outline: none; cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--aqua);
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(31,168,163,0.4);
      transition: background 2.5s ease;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--aqua);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    /* CTA button */
    .cta-button {
      width: 100%; max-width: 260px;
      padding: 14px 32px; border-radius: 12px;
      border: none; background: var(--blue); color: #fff;
      font-family: var(--sans); font-size: 14px; font-weight: 600;
      letter-spacing: 0.02em; cursor: pointer;
      transition: background 2.5s ease, box-shadow 2.5s ease, opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(45,127,168,0.3);
    }

    .cta-button:hover  { opacity: 0.88; }
    .cta-button:active { transform: scale(0.98); }

    .tagline {
      text-align: center; font-weight: 300;
      font-style: italic; font-size: 10px;
      color: var(--muted); line-height: 1.65;
      letter-spacing: 0.02em; max-width: 280px;
    }

    @media (min-height: 800px) {
      .main-circle      { width: 260px; height: 260px; }
      .ripple-container { width: 260px; height: 260px; }
      .bpm-number       { font-size: 84px; }
    }

    @media (min-width: 600px) {
      .main-circle      { width: 270px; height: 270px; }
      .ripple-container { width: 270px; height: 270px; }
      .bpm-number       { font-size: 88px; }
      .cta-button       { max-width: 300px; }
    }
  </style>
</head>
<body class="idle" id="appRoot">

  <header class="header">
    <div class="app-name">SlowBeat</div>
    <div class="stage-badge" id="stageBadge">
      <span class="dot" id="stageDot"></span>
      <span id="stageText">Awake</span>
    </div>
  </header>

  <main class="center-stage">
    <div class="breathing-ring" id="breathingRing"></div>
    <div class="ripple-container" id="rippleContainer">
      <div class="ripple ripple-1" id="ripple1"></div>
      <div class="ripple ripple-2" id="ripple2"></div>
    </div>
    <div class="main-circle" id="mainCircle">
      <div class="bpm-number" id="bpmDisplay">65</div>
      <div class="bpm-label">BPM</div>
      <div class="time-elapsed" id="timeElapsed">0:00</div>
    </div>
  </main>

  <section class="bottom-section">
    <div class="progress-timeline">
      <div class="stage-segments" id="stageSegments">
        <div class="segment" id="seg-0" style="flex:5"><div class="segment-fill" id="fill-0"></div></div>
        <div class="segment" id="seg-1" style="flex:7"><div class="segment-fill" id="fill-1"></div></div>
        <div class="segment" id="seg-2" style="flex:10"><div class="segment-fill" id="fill-2"></div></div>
        <div class="segment" id="seg-3" style="flex:8"><div class="segment-fill" id="fill-3"></div></div>
      </div>
      <div class="stage-labels">
        <span class="stage-label active" id="lbl-0">Awake</span>
        <span class="stage-label" id="lbl-1">Drifting</span>
        <span class="stage-label" id="lbl-2">Light Sleep</span>
        <span class="stage-label" id="lbl-3">Deep Sleep</span>
      </div>
    </div>

    <div class="volume-row">
      <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <span class="volume-label">Volume</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="75" />
    </div>

    <button class="cta-button" id="ctaButton">Begin Sleep Journey</button>
    <p class="tagline">Auditory entrainment aligned with your natural cardiac rhythm</p>
  </section>

<script>
(function () {
  'use strict';

  // ── STAGE DEFINITIONS ─────────────────────────────────────────────────────
  const STAGES = [
    { name: 'Awake',       startMin: 0,  endMin: 5,  startBpm: 65, endBpm: 60, accentHex: '#2d7fa8', glowRgba: '45,127,168' },
    { name: 'Drifting',    startMin: 5,  endMin: 12, startBpm: 60, endBpm: 55, accentHex: '#2896a0', glowRgba: '40,150,160' },
    { name: 'Light Sleep', startMin: 12, endMin: 22, startBpm: 55, endBpm: 50, accentHex: '#1fa8a3', glowRgba: '31,168,163' },
    { name: 'Deep Sleep',  startMin: 22, endMin: 30, startBpm: 50, endBpm: 45, accentHex: '#18a09a', glowRgba: '24,160,154' },
    { name: 'Sleeping',    startMin: 30, endMin: 35, startBpm: 45, endBpm: 45, accentHex: '#4ab5b0', glowRgba: '74,181,176' },
  ];

  const FADE_START_SECONDS = 30 * 60;
  const FADE_END_SECONDS   = 35 * 60;

  let appState        = 'idle';
  let elapsed         = 0;
  let currentBpm      = 65;
  let currentStageIdx = 0;
  let beatTimer       = null;
  let clockTimer      = null;

  // ── AUDIO ─────────────────────────────────────────────────────────────────
  let audioCtx   = null;
  let masterGain = null;

  // FIX: async — await resume() so AudioContext is fully running before beat scheduling
  async function ensureAudioCtx() {
    if (!audioCtx) {
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = getVolume();
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
  }

  function getVolume() {
    return document.getElementById('volumeSlider').value / 100 * 0.9;
  }

  function playLubDub() {
    if (!audioCtx || appState !== 'running') return;
    const now = audioCtx.currentTime;
    playThud(now,        80, 0.105, 0.0015, 0.095, 1.0);
    playThud(now + 0.22, 60, 0.09,  0.001,  0.075, 0.72);
  }

  function playThud(startTime, freq, duration, attack, decay, gainMult) {
    const osc      = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const filter   = audioCtx.createBiquadFilter();

    osc.type               = 'sine';
    osc.frequency.value    = freq;
    filter.type            = 'lowpass';
    filter.frequency.value = 180;
    filter.Q.value         = 1.8;

    gainNode.gain.setValueAtTime(0, startTime);
    gainNode.gain.linearRampToValueAtTime(gainMult * 0.9, startTime + attack);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + attack + decay);

    osc.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(masterGain);

    osc.start(startTime);
    osc.stop(startTime + duration);
    osc.onended = () => { try { osc.disconnect(); filter.disconnect(); gainNode.disconnect(); } catch(e){} };
  }

  // ── BPM CALC ──────────────────────────────────────────────────────────────
  function calcBpm(sec) {
    for (let i = 0; i < STAGES.length; i++) {
      const s  = STAGES[i];
      const s0 = s.startMin * 60, s1 = s.endMin * 60;
      if (sec >= s0 && sec < s1) {
        const t = (sec - s0) / (s1 - s0);
        return s.startBpm + (s.endBpm - s.startBpm) * t;
      }
    }
    return 45;
  }

  function getCurrentStageIdx(sec) {
    if (sec >= FADE_END_SECONDS) return STAGES.length - 1;
    for (let i = 0; i < STAGES.length; i++) {
      if (sec < STAGES[i].endMin * 60) return i;
    }
    return STAGES.length - 1;
  }

  // ── BEAT LOOP ─────────────────────────────────────────────────────────────
  function scheduleBeat() {
    if (appState !== 'running') return;
    const bpm      = calcBpm(elapsed);
    const interval = (60 / bpm) * 1000;
    playLubDub();
    triggerVisualBeat();
    beatTimer = setTimeout(scheduleBeat, interval);
  }

  function triggerVisualBeat() {
    const circle = document.getElementById('mainCircle');
    const r1 = document.getElementById('ripple1');
    const r2 = document.getElementById('ripple2');
    circle.classList.remove('beat'); void circle.offsetWidth; circle.classList.add('beat');
    r1.classList.remove('fire'); r2.classList.remove('fire');
    void r1.offsetWidth;
    r1.classList.add('fire'); r2.classList.add('fire');
  }

  // ── CLOCK ─────────────────────────────────────────────────────────────────
  function startClock() {
    clearInterval(clockTimer);
    clockTimer = setInterval(() => {
      if (appState !== 'running') return;
      elapsed++;
      updateUI();
    }, 1000);
  }

  function updateUI() {
    const bpm      = calcBpm(elapsed);
    currentBpm     = bpm;
    const stageIdx = getCurrentStageIdx(elapsed);
    const changed  = stageIdx !== currentStageIdx;
    currentStageIdx = stageIdx;

    if (masterGain && elapsed >= FADE_START_SECONDS) {
      const progress   = Math.min(1, (elapsed - FADE_START_SECONDS) / (FADE_END_SECONDS - FADE_START_SECONDS));
      const targetGain = getVolume() * (1 - progress);
      masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.5);
      if (progress >= 1) {
        clearTimeout(beatTimer); clearInterval(clockTimer);
        appState = 'sleeping';
        document.getElementById('stageText').textContent  = 'Sleeping';
        document.getElementById('ctaButton').textContent  = 'End Session';
        document.getElementById('bpmDisplay').textContent = '♥';
        return;
      }
    }

    document.getElementById('bpmDisplay').textContent = Math.round(bpm);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('timeElapsed').textContent = `${m}:${s.toString().padStart(2,'0')}`;

    if (changed) applyStageColor(stageIdx);
    updateProgressBar();
  }

  function applyStageColor(idx) {
    const badge  = document.getElementById('stageBadge');
    const dot    = document.getElementById('stageDot');
    const bpmNum = document.getElementById('bpmDisplay');
    const stage  = STAGES[idx];
    const h = stage.accentHex, g = stage.glowRgba;

    badge.style.background  = hexToRgba(h, 0.1);
    badge.style.borderColor = hexToRgba(h, 0.28);
    badge.style.color       = h;
    dot.style.background    = h;
    document.getElementById('stageText').textContent = stage.name;

    bpmNum.style.color = h;
    document.querySelector('.bpm-label').style.color = hexToRgba(h, 0.45);
    document.getElementById('ripple1').style.borderColor = hexToRgba(h, 0.4);
    document.getElementById('ripple2').style.borderColor = hexToRgba(h, 0.2);
    document.getElementById('breathingRing').style.borderColor = hexToRgba(h, 0.15);

    document.getElementById('mainCircle').style.background = `
      radial-gradient(circle at 42% 38%,
        rgba(255,255,255,0.88) 0%,
        rgba(${g},0.22) 48%,
        rgba(${g},0.06) 72%,
        transparent 88%)`;
    document.getElementById('mainCircle').style.boxShadow = `
      0 0 0 1px rgba(${g},0.2),
      0 8px 40px rgba(${g},0.2),
      0 2px 12px rgba(${g},0.12)`;

    const btn = document.getElementById('ctaButton');
    btn.style.background = h;
    btn.style.boxShadow  = `0 4px 20px rgba(${g},0.28)`;
    btn.style.color      = '#fff';

    document.querySelectorAll('.stage-label').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
      el.style.color = (i === idx) ? h : '';
    });
  }

  function updateProgressBar() {
    STAGES.forEach((stage, i) => {
      const s0  = stage.startMin * 60, s1 = stage.endMin * 60;
      const fill = document.getElementById(`fill-${i}`);
      const seg  = document.getElementById(`seg-${i}`);
      if (!fill || !seg) return;
      if (elapsed >= s1) {
        fill.style.width = '100%'; fill.style.background = stage.accentHex;
        seg.style.background = 'rgba(11,37,53,0.07)';
      } else if (elapsed >= s0) {
        fill.style.width = ((elapsed - s0) / (s1 - s0) * 100) + '%';
        fill.style.background = stage.accentHex;
        seg.style.background  = 'rgba(11,37,53,0.05)';
      } else {
        fill.style.width = '0%'; seg.style.background = 'rgba(11,37,53,0.1)';
      }
    });
  }

  // ── CONTROLS (async to properly await AudioContext resume) ─────────────────
  async function startSession() {
    await ensureAudioCtx();
    appState = 'running';
    setBodyState('running');
    document.getElementById('ctaButton').textContent = 'Pause';
    startClock();
    scheduleBeat();
    updateUI();
  }

  function pauseSession() {
    appState = 'paused';
    setBodyState('paused');
    clearTimeout(beatTimer); clearInterval(clockTimer);
    document.getElementById('ctaButton').textContent = 'Resume';
  }

  async function resumeSession() {
    await ensureAudioCtx();
    appState = 'running';
    setBodyState('running');
    document.getElementById('ctaButton').textContent = 'Pause';
    startClock();
    scheduleBeat();
  }

  function setBodyState(state) {
    const root = document.getElementById('appRoot');
    root.classList.remove('idle', 'running', 'paused');
    root.classList.add(state);
  }

  document.getElementById('ctaButton').addEventListener('click', () => {
    if (appState === 'idle')     return startSession();
    if (appState === 'running')  return pauseSession();
    if (appState === 'paused')   return resumeSession();
    if (appState === 'sleeping') {
      elapsed = 0; currentStageIdx = 0; appState = 'idle';
      setBodyState('idle');
      if (masterGain) masterGain.gain.setTargetAtTime(getVolume(), audioCtx.currentTime, 0.1);
      document.getElementById('ctaButton').textContent  = 'Begin Sleep Journey';
      document.getElementById('bpmDisplay').textContent = '65';
      applyStageColor(0);
      updateProgressBar();
    }
  });

  document.getElementById('volumeSlider').addEventListener('input', () => {
    if (masterGain) masterGain.gain.setTargetAtTime(getVolume(), audioCtx.currentTime, 0.05);
  });

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  applyStageColor(0);
  updateProgressBar();

})();
</script>
